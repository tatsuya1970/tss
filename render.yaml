services:
  - type: web
    name: hiroshima-news
    plan: free
    runtime: python
    rootDir: hiroshima-news
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: OPENAI_API_KEY
        sync: false

  - type: web
    name: sns-analyze
    plan: free
    runtime: docker
    rootDir: sns-analyze
    dockerfilePath: ./Dockerfile
    envVars:
      - key: TWITTER_BEARER_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
